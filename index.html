<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Grade 10 Classmates</title>

    <style>
        body {
            background: url("back.jpg") no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        .main-box {
            width: 90%;
            max-width: 600px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);

            color: cyan;
            text-shadow: 0 0 8px cyan;

            transition: all 0.3s ease;
        }

        /* Hover Animation */
        .main-box:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px cyan;
        }

        h2, p {
            text-align: center;
        }

        input, select {
            background: transparent !important;
            color: cyan !important;
            border: 1px solid cyan !important;
            box-shadow: 0 0 5px cyan;
        }

        input::placeholder {
            color: cyan;
            opacity: 0.7;
        }

        .btn-custom {
            background: transparent;
            border: 1px solid cyan;
            color: cyan;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: cyan;
            color: black;
            box-shadow: 0 0 15px cyan;
        }

        #output {
            margin-top: 15px;
            white-space: pre-line;
        }
        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
        select option {
            background: black;
            color: cyan;
        }
    </style>
</head>

<body>

<div class="main-box">

    <h2 style="color: violet; text-shadow: 0 0 12px violet;">
    Grade 10 Students!
</h2>

    <input type="text" id="search" class="form-control mb-3" placeholder="Search classmate..." oninput="show_classmates()">
    <input type="text" id="classmate1" class="form-control mb-3" placeholder="Enter classmate name">
    <select id="section" class="form-control mb-3">
    <option value="">Select Section</option>
    <option value="Emerald">Emerald</option>
    <option value="Ruby">Ruby</option>
</select>
    <select id="subject" class="form-control mb-3">
    <option value="">Select Favorite Subject</option>
    <option>ICT</option>
    <option>Filipino</option>
    <option>PE</option>
    <option>Math</option>
    <option>Science</option>
    <option>English</option>
    <option>Social Studies</option>
    <option>VE</option>
    <option>Music and Arts</option>
    <option>TLE</option>
</select>

    <div class="d-flex gap-2">
        <input type="button" py-click="add_classmate" class="btn btn-custom w-50" value="Add Classmate">
        <input type="button" id="toggleBtn" py-click="show_classmates" class="btn btn-custom w-50" value="Show List">
    </div>

    <div id="output"></div>

</div>

<py-script src="main.py"></py-script>

</body>
</html>
